<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter Listener</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #e3f2fd; padding: 20px; color: #1565c0;
            margin: 0; overflow-x: hidden;
            text-align: center;
        }
        
        h1 { color: #1976d2; font-size: 2.5rem; text-shadow: 2px 2px 0px #fff; margin-bottom: 5px; }
        p { font-size: 20px; color: #1e88e5; font-weight: bold; margin-top: 0; margin-bottom: 30px;}

        .game-board {
            background: white; padding: 40px 30px 30px 30px; border-radius: 25px; 
            border: 4px solid #90caf9; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; gap: 30px;
            position: relative; z-index: 10;
        }

        /* Score Badge */
        #score-board {
            position: absolute; top: -25px;
            background: #ffca28; color: #e65100;
            padding: 10px 25px; border-radius: 25px;
            font-size: 26px; font-weight: bold;
            box-shadow: 0 6px 0 #ff8f00; border: 4px solid #fff;
            transition: transform 0.2s;
        }

        .pop-score { transform: scale(1.2); color: #bf360c !important; }

        /* Streak Banner */
        #streak-banner {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #ff5252; color: white;
            padding: 15px 40px; border-radius: 50px;
            font-size: 35px; font-weight: bold;
            box-shadow: 0 10px 25px rgba(255, 82, 82, 0.5);
            border: 4px solid #fff; z-index: 50;
            pointer-events: none; opacity: 0;
        }

        .show-streak {
            animation: roll-anim 2s ease-in-out forwards;
        }

        @keyframes roll-anim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1) rotate(-5deg); }
            45% { transform: translate(-50%, -50%) scale(1) rotate(5deg); }
            60% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        /* The Speaker Button */
        #speaker-btn {
            background-color: #ffb74d; color: white; border: none; border-radius: 50%;
            width: 100px; height: 100px; font-size: 50px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 8px 0 #f57c00; transition: transform 0.1s, box-shadow 0.1s;
        }

        #speaker-btn:active { transform: translateY(8px); box-shadow: 0 0px 0 #f57c00; }
        
        .pulse { animation: pulse-anim 1s infinite; }
        @keyframes pulse-anim {
            0% { transform: scale(1); box-shadow: 0 8px 0 #f57c00, 0 0 0 0 rgba(255, 183, 77, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 8px 0 #f57c00, 0 0 0 20px rgba(255, 183, 77, 0); }
            100% { transform: scale(1); box-shadow: 0 8px 0 #f57c00, 0 0 0 0 rgba(255, 183, 77, 0); }
        }

        /* Letter Options */
        .options-container {
            display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; width: 100%;
        }

        .letter-btn {
            background: #ffffff; color: #1565c0;
            border: 4px solid #64b5f6; border-radius: 20px;
            width: 100px; height: 100px; font-size: 60px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 8px 0 #64b5f6;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .letter-btn:hover { transform: translateY(-4px); box-shadow: 0 12px 0 #64b5f6; }
        .letter-btn:active { transform: translateY(8px); box-shadow: 0 0px 0 #64b5f6; }

        /* Incorrect Guess Animation */
        .wrong-guess {
            background-color: #ffebee !important;
            color: #d32f2f !important;
            border-color: #ef5350 !important;
            box-shadow: 0 4px 0 #ef5350 !important;
            transform: translateY(4px) !important;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* Correct Guess Animation */
        .correct-guess {
            background-color: #e8f5e9 !important;
            color: #2e7d32 !important;
            border-color: #66bb6a !important;
            box-shadow: 0 4px 0 #66bb6a !important;
            transform: scale(1.15) !important;
            z-index: 5;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 4px, 0); }
            20%, 80% { transform: translate3d(4px, 4px, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 4px, 0); }
            40%, 60% { transform: translate3d(8px, 4px, 0); }
        }

        /* Feedback Area */
        #feedback-area {
            min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #feedback-text {
            font-size: 40px; font-weight: bold; color: #43a047;
            opacity: 0; transition: opacity 0.2s, transform 0.2s;
            transform: scale(0.5); text-shadow: 2px 2px 0px #e8f5e9;
        }

        .show-feedback { opacity: 1 !important; transform: scale(1) !important; }

        /* Restart Button (Hidden until win) */
        #restart-btn {
            background-color: #ba68c8; color: white; border: none; border-radius: 15px;
            padding: 15px 40px; font-size: 24px; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 0 #8e24aa; display: none; margin-top: 20px;
        }
        #restart-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #8e24aa; }

        /* Confetti */
        #confetti-svg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .particle { transition: all 1s cubic-bezier(0.1, 0.8, 0.3, 1); }

    </style>
</head>
<body>
<a href="index.html" id="home-link" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(255,255,255,0.9);border:2px solid #ddd;border-radius:50px;padding:6px 16px;font-family:'Comic Sans MS','Chalkboard SE',cursive;font-size:0.9rem;font-weight:bold;color:#555;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,0.13);white-space:nowrap;" title="Back to Home">&#x1F3E0; Home</a>
    <h1>🔤 Letter Listener 🔤</h1>
    <p>Listen carefully and click the matching letter!</p>

    <div class="game-board">
        <div id="score-board">⭐ Score: <span id="score-val">0</span> / 50</div>
        
        <div id="streak-banner">🔥 You're on a roll! 🔥</div>

        <button id="speaker-btn" class="pulse" onclick="playSound()">🔊</button>

        <div class="options-container" id="options">
            </div>

        <div id="feedback-area">
            <div id="feedback-text">Very Good! 🌟</div>
            <button id="restart-btn" onclick="resetGame()">Play Again 🔄</button>
        </div>
    </div>
    
    <svg id="confetti-svg"></svg>

<script>
    const optionsContainer = document.getElementById('options');
    const speakerBtn = document.getElementById('speaker-btn');
    const feedbackText = document.getElementById('feedback-text');
    const scoreVal = document.getElementById('score-val');
    const scoreBoard = document.getElementById('score-board');
    const streakBanner = document.getElementById('streak-banner');
    const restartBtn = document.getElementById('restart-btn');
    const confettiSvg = document.getElementById('confetti-svg');

    const alphabet = "abcdefghijklmnopqrstuvwxyz".split("");
    let currentLetter = "";
    let isWaitingForNext = false;
    let isShaking = false; 
    let currentAudio = null;

    // Game Progress Variables
    let score = 0;
    let currentStreak = 0;
    let targetStreak = getRandomStreakTarget();

    window.onload = startRound;

    // Picks a random goal of 4, 5, 6, or 7 for the streak animation
    function getRandomStreakTarget() {
        return Math.floor(Math.random() * 4) + 4; 
    }

    function resetGame() {
        score = 0;
        currentStreak = 0;
        targetStreak = getRandomStreakTarget();
        scoreVal.innerText = score;
        restartBtn.style.display = 'none';
        speakerBtn.style.display = 'flex';
        feedbackText.innerText = "Very Good! 🌟";
        startRound();
    }

    function startRound() {
        isWaitingForNext = false;
        isShaking = false;
        optionsContainer.innerHTML = '';
        confettiSvg.innerHTML = '';
        feedbackText.classList.remove('show-feedback');
        speakerBtn.classList.add('pulse');

        const isLowerCaseRound = Math.random() > 0.5;

        currentLetter = alphabet[Math.floor(Math.random() * alphabet.length)];

        let options = [currentLetter];
        while (options.length < 5) {
            let randomLetter = alphabet[Math.floor(Math.random() * alphabet.length)];
            if (!options.includes(randomLetter)) {
                options.push(randomLetter);
            }
        }

        options.sort(() => Math.random() - 0.5);

        options.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'letter-btn';
            btn.innerText = isLowerCaseRound ? letter : letter.toUpperCase(); 
            btn.onclick = () => handleGuess(btn, letter);
            optionsContainer.appendChild(btn);
        });

        setTimeout(playSound, 400);
    }

    function playSound() {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
        }
        
        currentAudio = new Audio(`sounds/${currentLetter}.wav`);
        
        currentAudio.play().catch(e => {
            console.log(`Could not play sounds/${currentLetter}.wav. Ensure files exist.`);
        });

        speakerBtn.classList.remove('pulse');
    }

    function handleGuess(btnElement, guessedLetter) {
        if (isWaitingForNext || isShaking) return;

        if (guessedLetter === currentLetter) {
            // --- CORRECT GUESS ---
            isWaitingForNext = true;
            btnElement.classList.add('correct-guess');
            
            // Dim wrong options
            Array.from(optionsContainer.children).forEach(child => {
                if (child !== btnElement) child.style.opacity = '0.3';
            });

            // Update Score & Streak
            score++;
            currentStreak++;
            scoreVal.innerText = score;
            
            // Pop the score badge
            scoreBoard.classList.add('pop-score');
            setTimeout(() => scoreBoard.classList.remove('pop-score'), 300);

            feedbackText.classList.add('show-feedback');
            fireConfetti();

            // Check Win Condition
            if (score >= 50) {
                triggerWin();
                return; // Stop the loop, game is over!
            }

            // Check Streak Animation
            let delayNextRound = 1000; // Standard 1-second auto-advance

            if (currentStreak === targetStreak) {
                // They hit the random streak goal! Show animation
                streakBanner.classList.add('show-streak');
                
                // Remove class after animation finishes so it can run again later
                setTimeout(() => streakBanner.classList.remove('show-streak'), 2000);
                
                // Reset streak tracking for the next random goal
                currentStreak = 0;
                targetStreak = getRandomStreakTarget();
                
                // Wait slightly longer before auto-advancing so they can enjoy the pop-up
                delayNextRound = 2200; 
            }

            // Auto-advance to next round
            setTimeout(startRound, delayNextRound);

        } else {
            // --- INCORRECT GUESS ---
            isShaking = true;
            currentStreak = 0; // Break the streak :(
            targetStreak = getRandomStreakTarget(); // Pick a new target
            
            btnElement.classList.add('wrong-guess');
            
            setTimeout(() => {
                btnElement.classList.remove('wrong-guess');
                playSound(); // Play sound AFTER the shake
                isShaking = false;
            }, 500);
        }
    }

    function triggerWin() {
        optionsContainer.innerHTML = '';
        speakerBtn.style.display = 'none';
        
        feedbackText.innerText = "🏆 YOU WIN! 🏆";
        feedbackText.style.fontSize = "60px";
        feedbackText.classList.add('show-feedback');
        
        restartBtn.style.display = 'block';
        
        // Massive Confetti Explosion
        fireConfetti(true);
    }

    function fireConfetti(isMassive = false) {
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        const colors = ['#64b5f6', '#4dd0e1', '#81c784', '#fff176', '#ffb74d', '#f06292'];
        
        const particleCount = isMassive ? 150 : 40;
        
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            particle.setAttribute("cx", centerX);
            particle.setAttribute("cy", centerY);
            particle.setAttribute("r", Math.random() * 6 + 4);
            particle.setAttribute("class", "particle");
            particle.style.fill = colors[Math.floor(Math.random() * colors.length)];
            confettiSvg.appendChild(particle);
            
            particle.getBoundingClientRect(); 
            
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * (isMassive ? 800 : 400) + 100; 
            
            particle.setAttribute("cx", centerX + Math.cos(angle) * distance);
            particle.setAttribute("cy", centerY + Math.sin(angle) * distance + (isMassive ? 200 : 150));
            particle.style.opacity = "0";
            
            setTimeout(() => particle.remove(), 1500);
        }
    }
</script>
</body>
</html>
