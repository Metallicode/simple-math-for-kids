<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bigger, Smaller, Equals</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #fff8e1; padding: 20px; color: #37474f;
            margin: 0;
        }
        
        h1 { color: #f57c00; font-size: 2.5rem; text-shadow: 2px 2px 0px #fff; margin-bottom: 10px; text-align: center; }

        .controls { 
            background: white; padding: 20px 40px; border-radius: 25px; 
            border: 4px solid #ffe082; box-shadow: 0 8px 0 #ffe082;
            margin-bottom: 30px; display: flex; gap: 30px; align-items: center; 
            justify-content: center;
        }
        
        input { 
            width: 100px; height: 80px; font-size: 48px; text-align: center; 
            border: 4px solid #4db6ac; border-radius: 20px; 
            color: #00796b; font-family: inherit; font-weight: bold;
            background-color: #e0f2f1; transition: transform 0.1s;
        }
        
        input:focus { outline: none; border-color: #00897b; transform: scale(1.05); }

        .symbol-box {
            font-size: 50px; font-weight: bold; color: #f57c00;
            width: 60px; text-align: center; text-shadow: 2px 2px 0px #ffe082;
        }

        #canvas-container { 
            background: white; border-radius: 25px; border: 4px solid #eceff1;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); overflow: hidden; position: relative;
            width: 100%; max-width: 900px;
        }
        
        svg { width: 100%; height: auto; display: block; }

        .dot { 
            stroke: white; stroke-width: 2;
        }

        .symbol-text {
            font-size: 100px; font-weight: bold; fill: #f57c00;
            text-anchor: middle; dominant-baseline: middle;
            opacity: 0;
            transform-origin: 450px 200px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pop-in { opacity: 1; transform: scale(1); }
        .pop-out { opacity: 0; transform: scale(0.2); }

        #result-text { 
            font-size: 40px; font-weight: bold; margin-top: 20px; 
            color: #00796b; min-height: 60px; text-shadow: 2px 2px 0px #fff;
            text-align: center;
        }
    </style>
</head>
<body>
<a href="index.html" id="home-link" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(255,255,255,0.9);border:2px solid #ddd;border-radius:50px;padding:6px 16px;font-family:'Comic Sans MS','Chalkboard SE',cursive;font-size:0.9rem;font-weight:bold;color:#555;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,0.13);white-space:nowrap;" title="Back to Home">&#x1F3E0; Home</a>
    <h1>⚖️ Let's Compare! ⚖️</h1>

    <div class="controls">
        <input type="number" id="num1" value="5" min="0" max="100">
        <div class="symbol-box" id="ui-symbol">?</div>
        <input type="number" id="num2" value="3" min="0" max="100">
    </div>

    <div id="canvas-container">
        <svg id="viz" viewBox="0 0 900 400">
            <rect x="20" y="20" width="380" height="360" rx="20" fill="#e1f5fe" stroke="#81d4fa" stroke-width="4" stroke-dasharray="10 10"/>
            <rect x="500" y="20" width="380" height="360" rx="20" fill="#f1f8e9" stroke="#aed581" stroke-width="4" stroke-dasharray="10 10"/>
            
            <g id="leftGroup"></g>
            <g id="rightGroup"></g>
            
            <circle cx="450" cy="200" r="45" fill="white" stroke="#ffe082" stroke-width="6"/>
            <text id="centerSymbol" x="450" y="210" class="symbol-text pop-out">?</text>
        </svg>
    </div>

    <div id="result-text">Type numbers to compare!</div>

<script>
    const input1 = document.getElementById('num1');
    const input2 = document.getElementById('num2');
    const uiSymbol = document.getElementById('ui-symbol');
    const centerSymbol = document.getElementById('centerSymbol');
    const leftGroup = document.getElementById('leftGroup');
    const rightGroup = document.getElementById('rightGroup');
    const resultText = document.getElementById('result-text');

    // Run once on load
    window.onload = updateComparison;

    // Listen for typing or clicking arrows
    input1.addEventListener('input', updateComparison);
    input2.addEventListener('input', updateComparison);

    function calculateDynamicSizes(count) {
        // Shrink dots based on how many there are so they fit in their boxes
        const radius = Math.max(6, 25 - (count * 0.2));
        const spacing = radius * 2.4;
        const cols = Math.max(1, Math.ceil(Math.sqrt(count)));
        return { radius, spacing, cols };
    }

    function drawDots(group, count, centerX, centerY, color) {
        group.innerHTML = '';
        if (count <= 0) return;

        const { radius, spacing, cols } = calculateDynamicSizes(count);
        const rows = Math.ceil(count / cols);
        
        // Calculate starting X and Y to keep the cluster perfectly centered
        const startX = centerX - ((cols - 1) * spacing) / 2;
        const startY = centerY - ((rows - 1) * spacing) / 2;

        for (let i = 0; i < count; i++) {
            const c = i % cols;
            const r = Math.floor(i / cols);
            const x = startX + c * spacing;
            const y = startY + r * spacing;
            
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", x);
            circle.setAttribute("cy", y);
            circle.setAttribute("r", "0"); // Start at size 0 for animation
            circle.setAttribute("class", "dot");
            circle.style.fill = color;
            
            group.appendChild(circle);

            // Fast pop-in animation
            setTimeout(() => {
                circle.style.transition = "r 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
                circle.setAttribute("r", radius);
            }, i * 30); // 30ms delay between each dot appearing
        }
    }

    function updateComparison() {
        const val1 = parseInt(input1.value);
        const val2 = parseInt(input2.value);

        // Don't calculate if inputs are totally empty or invalid
        if (isNaN(val1) || isNaN(val2)) {
            uiSymbol.innerText = "?";
            centerSymbol.classList.replace('pop-in', 'pop-out');
            resultText.innerText = "Waiting for numbers...";
            return;
        }

        // Draw left group (center of left box is X:210, Y:200)
        drawDots(leftGroup, val1, 210, 200, "#29b6f6"); 
        
        // Draw right group (center of right box is X:690, Y:200)
        drawDots(rightGroup, val2, 690, 200, "#8bc34a");

        // Calculate result and wait slightly for dots to start drawing before dropping the symbol
        setTimeout(() => {
            let symbol = "";
            let text = "";

            if (val1 > val2) {
                symbol = ">";
                text = `${val1} is GREATER THAN ${val2}`;
            } else if (val1 < val2) {
                symbol = "<";
                text = `${val1} is LESS THAN ${val2}`;
            } else {
                symbol = "=";
                text = `${val1} is EQUAL TO ${val2}`;
            }

            // Update UI
            uiSymbol.innerText = symbol;
            resultText.innerText = text;

            // Animate big central symbol (force redraw to restart CSS animation)
            centerSymbol.classList.remove('pop-in');
            centerSymbol.classList.add('pop-out');
            
            setTimeout(() => {
                centerSymbol.textContent = symbol;
                centerSymbol.classList.remove('pop-out');
                centerSymbol.classList.add('pop-in');
            }, 100);

        }, 300); // 300ms delay gives the dots time to appear first
    }
</script>
</body>
</html>
