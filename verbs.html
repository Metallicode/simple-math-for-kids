<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Theater: Learn Verbs</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #fff3e0; padding: 20px; color: #4e342e;
            margin: 0; overflow-x: hidden; text-align: center;
        }
        
        h1 { color: #d84315; font-size: 2.5rem; text-shadow: 2px 2px 0px #fff; margin-bottom: 5px; }
        p { font-size: 20px; color: #e64a19; font-weight: bold; margin-top: 0; margin-bottom: 20px;}

        .game-board {
            background: white; padding: 30px; border-radius: 25px; 
            border: 4px solid #ffcc80; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; gap: 20px;
            position: relative; z-index: 10;
        }

        #score-board {
            position: absolute; top: -25px; background: #66bb6a; color: white;
            padding: 10px 25px; border-radius: 25px; font-size: 24px; font-weight: bold;
            box-shadow: 0 6px 0 #43a047; border: 4px solid #fff; transition: transform 0.2s;
        }
        .pop-score { transform: scale(1.2); background: #81c784 !important; }

        /* Streak Banner */
        #streak-banner {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: #ff5252; color: white; padding: 15px 40px; border-radius: 50px;
            font-size: 35px; font-weight: bold; box-shadow: 0 10px 25px rgba(255, 82, 82, 0.5);
            border: 4px solid #fff; z-index: 50; pointer-events: none; opacity: 0;
        }
        .show-streak { animation: roll-anim 2s ease-in-out forwards; }
        @keyframes roll-anim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1) rotate(-5deg); }
            45% { transform: translate(-50%, -50%) scale(1) rotate(5deg); }
            60% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        /* The Context Question */
        #question-display {
            background-color: #fff8e1; border: 3px dashed #ffb74d; border-radius: 15px;
            padding: 15px 30px; font-size: 30px; font-weight: bold; color: #e65100;
            width: 90%; box-shadow: inset 0 0 15px rgba(255, 183, 77, 0.2);
        }

        /* --- THE THEATER STAGE --- */
        #stage {
            background: radial-gradient(circle at 50% 100%, #ffe082 0%, #ffcc80 40%, #ffb74d 100%);
            border: 8px solid #c62828; border-radius: 20px 20px 5px 5px; 
            width: 100%; max-width: 500px; height: 250px; 
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 20px 30px rgba(0,0,0,0.1), 0 10px 0 #b71c1c;
            position: relative; overflow: hidden; margin-bottom: 10px;
        }
        
        /* The Curtains */
        .curtain { position: absolute; top: 0; bottom: 0; width: 50%; background: #d32f2f; z-index: 5; transition: transform 1s cubic-bezier(0.25, 0.8, 0.25, 1); border-left: 4px solid #b71c1c; border-right: 4px solid #b71c1c;}
        .curtain.left { left: 0; transform-origin: left; }
        .curtain.right { right: 0; transform-origin: right; }
        .curtain.open.left { transform: scaleX(0.1); }
        .curtain.open.right { transform: scaleX(0.1); }

        /* The Actor */
        #actor {
            font-size: 90px; user-select: none; z-index: 2;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.3));
        }

        /* --- CSS VERB ANIMATIONS --- */
        .anim-jump { animation: act-jump 0.6s ease-in-out infinite alternate; }
        @keyframes act-jump { 0% { transform: translateY(60px) scaleY(0.8); } 100% { transform: translateY(-80px) scaleY(1.05); } }

        .anim-spin { animation: act-spin 1.5s linear infinite; }
        @keyframes act-spin { 100% { transform: rotate(360deg); } }

        .anim-grow { animation: act-grow 1s ease-in-out infinite alternate; }
        @keyframes act-grow { 0% { transform: scale(0.6); } 100% { transform: scale(1.6); } }

        .anim-shrink { animation: act-shrink 1s ease-in-out infinite alternate; }
        @keyframes act-shrink { 0% { transform: scale(1.2); } 100% { transform: scale(0.4); } }

        .anim-wobble { animation: act-wobble 0.5s ease-in-out infinite alternate; transform-origin: bottom center; }
        @keyframes act-wobble { 0% { transform: rotate(-25deg); } 100% { transform: rotate(25deg); } }

        .anim-run { animation: act-run 0.8s ease-in-out infinite alternate; }
        @keyframes act-run { 0% { transform: translateX(-120px) skewX(-15deg); } 100% { transform: translateX(120px) skewX(15deg); } }

        .anim-fly { animation: act-fly 2s ease-in-out infinite alternate; }
        @keyframes act-fly { 0% { transform: translate(-100px, 80px) rotate(-15deg); } 50% { transform: translate(0px, -50px) rotate(0deg); } 100% { transform: translate(100px, 80px) rotate(15deg); } }

        .anim-shake { animation: act-shake 0.2s linear infinite alternate; }
        @keyframes act-shake { 0% { transform: translateX(-10px); } 100% { transform: translateX(10px); } }

        /* The Options Area */
        .options-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 600px;
        }

        .verb-btn {
            background: #ffffff; color: #1565c0; border: 4px solid #64b5f6; border-radius: 15px;
            padding: 20px; font-size: 28px; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 0 #64b5f6; transition: all 0.1s; text-transform: lowercase;
        }

        .verb-btn:hover { transform: translateY(-4px); box-shadow: 0 10px 0 #64b5f6; }
        .verb-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #64b5f6; }

        /* Actions/Buttons */
        #next-btn {
            background-color: #ffb74d; color: white; border: none; border-radius: 15px;
            padding: 15px 40px; font-size: 24px; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 0 #f57c00; display: none; margin-top: 10px;
        }
        #next-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #f57c00; }

        /* Feedback Animations */
        .wrong-shake { animation: ui-shake 0.4s cubic-bezier(.36,.07,.19,.97) both !important; border-color: #ef5350 !important; background: #ffebee !important; color: #c62828 !important;}
        .correct-pulse { background-color: #e8f5e9 !important; border-color: #4caf50 !important; color: #2e7d32 !important; transform: scale(1.05) !important;}
        @keyframes ui-shake { 10%, 90% { transform: translate3d(-4px, 0, 0); } 20%, 80% { transform: translate3d(8px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-12px, 0, 0); } 40%, 60% { transform: translate3d(12px, 0, 0); } }

        #feedback-text { font-size: 35px; font-weight: bold; color: #d84315; opacity: 0; transform: scale(0.5); transition: all 0.2s; }
        .show-feedback { opacity: 1 !important; transform: scale(1) !important; }

        #confetti-svg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .particle { transition: all 1s cubic-bezier(0.1, 0.8, 0.3, 1); }

        @media (max-width: 600px) {
            .options-container { grid-template-columns: 1fr; }
            #stage { height: 200px; }
            #actor { font-size: 70px; }
        }
    </style>
</head>
<body>

    <h1>🎭 Action Theater 🎭</h1>
    <p>Watch the show! What is the actor doing?</p>

    <div class="game-board">
        <div id="score-board">⭐ Score: <span id="score-val">0</span></div>
        <div id="streak-banner">🔥 You're on a roll! 🔥</div>
        
        <div id="question-display">Loading Stage...</div>
        
        <div id="stage">
            <div class="curtain left" id="curtain-l"></div>
            <div class="curtain right" id="curtain-r"></div>
            <div id="actor"></div>
        </div>

        <div class="options-container" id="options"></div>
        
        <button id="next-btn" onclick="startRound()">Next Show ➡️</button>
        <div id="feedback-text">Bravo! 🌟</div>
    </div>
    
    <svg id="confetti-svg"></svg>

<script>
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playTone(freq, type, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = type; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const questionDisplay = document.getElementById('question-display');
    const stage = document.getElementById('stage');
    const actorEl = document.getElementById('actor');
    const curtainL = document.getElementById('curtain-l');
    const curtainR = document.getElementById('curtain-r');
    const optionsContainer = document.getElementById('options');
    const nextBtn = document.getElementById('next-btn');
    const feedbackText = document.getElementById('feedback-text');
    const scoreVal = document.getElementById('score-val');
    const scoreBoard = document.getElementById('score-board');
    const streakBanner = document.getElementById('streak-banner');
    const confettiSvg = document.getElementById('confetti-svg');

    // --- DICTIONARIES ---
    const actors = ['🐶', '🐱', '🐸', '🐵', '🚀', '🎈', '⚽', '🚗', '⭐', '⛄', '🍎', '🤖', '🦖', '🦄', '🐷'];
    
    const verbs = [
        { word: 'jumping', cssClass: 'anim-jump' },
        { word: 'spinning', cssClass: 'anim-spin' },
        { word: 'growing', cssClass: 'anim-grow' },
        { word: 'shrinking', cssClass: 'anim-shrink' },
        { word: 'wobbling', cssClass: 'anim-wobble' },
        { word: 'running', cssClass: 'anim-run' },
        { word: 'flying', cssClass: 'anim-fly' },
        { word: 'shaking', cssClass: 'anim-shake' }
    ];

    let score = 0;
    let currentStreak = 0;
    let targetStreak = getRandomStreakTarget();
    let isWaitingForNext = false;
    let currentVerb = null;

    window.onload = startRound;

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }
    function getRandom(arr, count = 1) { const shuffled = shuffle([...arr]); return count === 1 ? shuffled[0] : shuffled.slice(0, count); }
    function getRandomStreakTarget() { return Math.floor(Math.random() * 4) + 4; }

    function startRound() {
        isWaitingForNext = false;
        nextBtn.style.display = 'none';
        feedbackText.classList.remove('show-feedback');
        
        // Close Curtains
        curtainL.classList.remove('open');
        curtainR.classList.remove('open');

        setTimeout(() => {
            // Setup new scene while curtains are closed
            const actorEmoji = getRandom(actors);
            currentVerb = getRandom(verbs);
            
            questionDisplay.innerHTML = `Look at the ${actorEmoji}! What is it doing?`;
            
            // Clean actor and apply new animation
            actorEl.className = ''; 
            actorEl.innerText = actorEmoji;
            
            // We force a reflow to ensure the CSS animation restarts cleanly
            void actorEl.offsetWidth; 
            actorEl.classList.add(currentVerb.cssClass);

            // Generate Options
            const distractors = getRandom(verbs.filter(v => v.word !== currentVerb.word), 3);
            const allOptions = shuffle([currentVerb, ...distractors]);
            
            optionsContainer.innerHTML = '';
            allOptions.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'verb-btn';
                btn.innerText = opt.word;
                btn.onclick = () => handleGuess(btn, opt.word);
                optionsContainer.appendChild(btn);
            });

            // Open Curtains
            initAudio(); playTone(300, 'sine', 0.8); // Curtain sound
            curtainL.classList.add('open');
            curtainR.classList.add('open');
            
        }, 800); // Wait for curtains to close before changing actor
    }

    function handleGuess(btnEl, guessedWord) {
        if (isWaitingForNext) return;

        if (guessedWord === currentVerb.word) {
            // CORRECT
            isWaitingForNext = true;
            btnEl.classList.add('correct-pulse');
            
            // Dim wrong answers
            Array.from(optionsContainer.children).forEach(child => {
                if (child !== btnEl) child.style.opacity = '0.4';
            });

            initAudio();
            playTone(400, 'sine', 0.1); setTimeout(() => playTone(600, 'sine', 0.1), 100); setTimeout(() => playTone(800, 'sine', 0.4), 200);

            score++; currentStreak++;
            scoreVal.innerText = score;
            scoreBoard.classList.add('pop-score');
            setTimeout(() => scoreBoard.classList.remove('pop-score'), 300);

            feedbackText.classList.add('show-feedback');
            fireConfetti();

            if (currentStreak === targetStreak) {
                streakBanner.classList.add('show-streak');
                setTimeout(() => streakBanner.classList.remove('show-streak'), 2000);
                currentStreak = 0; targetStreak = getRandomStreakTarget();
            }

            nextBtn.style.display = 'block';

        } else {
            // WRONG
            currentStreak = 0; targetStreak = getRandomStreakTarget();
            initAudio(); playTone(200, 'sawtooth', 0.3);
            btnEl.classList.add('wrong-shake');
            setTimeout(() => btnEl.classList.remove('wrong-shake'), 400);
        }
    }

    function fireConfetti() {
        const cx = window.innerWidth / 2; const cy = window.innerHeight / 2;
        const colors = ['#e65100', '#ffb74d', '#81c784', '#4fc3f7', '#ffca28'];
        
        for (let i = 0; i < 50; i++) {
            const p = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            p.setAttribute("cx", cx); p.setAttribute("cy", cy);
            p.setAttribute("r", Math.random() * 6 + 4); p.setAttribute("class", "particle");
            p.style.fill = colors[Math.floor(Math.random() * colors.length)];
            confettiSvg.appendChild(p);
            
            p.getBoundingClientRect(); 
            const angle = Math.random() * Math.PI * 2; const distance = Math.random() * 400 + 100; 
            
            p.setAttribute("cx", cx + Math.cos(angle) * distance);
            p.setAttribute("cy", cy + Math.sin(angle) * distance + 150);
            p.style.opacity = "0";
            
            setTimeout(() => p.remove(), 1500);
        }
    }
</script>
</body>
</html>
