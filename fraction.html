<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Fraction Chef</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #fff3e0; padding: 20px; color: #4e342e;
            margin: 0; overflow-x: hidden;
        }
        
        h1 { color: #d84315; font-size: 2.5rem; text-shadow: 2px 2px 0px #fff; margin-bottom: 5px; text-align: center; }

        #instructions { font-size: 22px; font-weight: bold; color: #bf360c; margin-bottom: 10px; text-align: center; }
        #streak-counter { font-size: 20px; font-weight: bold; color: #f57c00; margin-bottom: 20px; background: white; padding: 5px 15px; border-radius: 15px; border: 2px solid #ffb74d; }

        .game-board {
            background: white; padding: 30px; border-radius: 25px; 
            border: 4px solid #ffcc80; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 20px;
            position: relative; z-index: 10;
        }

        /* The Target Fraction Display */
        .fraction-display {
            display: flex; flex-direction: column; align-items: center;
            font-size: 60px; font-weight: bold; color: #d84315;
            background: #fff8e1; padding: 20px 40px; border-radius: 20px;
            border: 4px dashed #ffb74d; line-height: 1.1;
        }
        
        .fraction-line {
            width: 100%; height: 6px; background-color: #d84315; border-radius: 3px;
            margin: 5px 0;
        }

        /* SVG Pizza Styles */
        svg { width: 300px; height: 300px; drop-shadow: 0 10px 10px rgba(0,0,0,0.1); cursor: pointer; }
        
        .pan { fill: #cfd8dc; stroke: #90a4ae; stroke-width: 4; }
        .pan-inner { fill: #eceff1; }
        
        .slice {
            fill: transparent;
            stroke: #ffcc80; stroke-width: 2;
            transition: fill 0.2s, transform 0.2s;
            transform-origin: 150px 150px;
        }

        .slice:hover { fill: #fff9c4; }

        /* When a slice is clicked/filled */
        .slice-filled {
            fill: #ffca28 !important; /* Cheese! */
            stroke: #e65100;
            stroke-width: 3;
        }

        .crust { fill: #f57c00; }

        #confetti-svg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }
        .particle { transition: all 1s cubic-bezier(0.1, 0.8, 0.3, 1); }

    </style>
</head>
<body>
<a href="index.html" id="home-link" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(255,255,255,0.9);border:2px solid #ddd;border-radius:50px;padding:6px 16px;font-family:'Comic Sans MS','Chalkboard SE',cursive;font-size:0.9rem;font-weight:bold;color:#555;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,0.13);white-space:nowrap;" title="Back to Home">&#x1F3E0; Home</a>
    <h1>🍕 Fraction Chef! 🍕</h1>
    <div id="instructions">Tap the pan to bake the right amount of slices!</div>
    <div id="streak-counter">Pizzas Baked: 0 👨‍🍳</div>

    <div class="game-board">
        <div class="fraction-display">
            <div id="numerator">3</div>
            <div class="fraction-line"></div>
            <div id="denominator">4</div>
        </div>

        <svg id="pizza-svg" viewBox="0 0 300 300">
            <circle class="pan" cx="150" cy="150" r="145" />
            <circle class="pan-inner" cx="150" cy="150" r="130" />
            
            <g id="slices-group"></g>
        </svg>
    </div>
    
    <svg id="confetti-svg"></svg>

<script>
    const numeratorEl = document.getElementById('numerator');
    const denominatorEl = document.getElementById('denominator');
    const slicesGroup = document.getElementById('slices-group');
    const streakCounter = document.getElementById('streak-counter');
    const confettiSvg = document.getElementById('confetti-svg');

    let streak = 0;
    let targetNum = 0;
    let targetDen = 0;
    let currentFilled = 0;
    let isAnimating = false;

    window.onload = initRound;

    function initRound() {
        isAnimating = false;
        slicesGroup.innerHTML = '';
        currentFilled = 0;

        // Choose a random denominator (2, 3, 4, 5, 6, 8)
        const denominators = [2, 3, 4, 5, 6, 8];
        targetDen = denominators[Math.floor(Math.random() * denominators.length)];
        
        // Choose a random numerator (1 up to the denominator)
        targetNum = Math.floor(Math.random() * targetDen) + 1;

        // Update UI
        numeratorEl.innerText = targetNum;
        denominatorEl.innerText = targetDen;

        // Draw the pizza slices
        drawPizza(targetDen);
    }

    function drawPizza(slices) {
        const cx = 150, cy = 150, r = 135;
        const sliceAngle = 360 / slices;
        
        // Calculate the end coordinates for a single slice starting from top (0 degrees)
        // Converting degrees to radians for math
        const rad = sliceAngle * (Math.PI / 180);
        const x2 = cx + r * Math.sin(rad);
        const y2 = cy - r * Math.cos(rad);
        
        // If the slice is exactly 1 whole pizza (360), draw a full circle instead of a path
        if (slices === 1) {
            // Edge case, though our array starts at 2
            return; 
        }

        const largeArcFlag = sliceAngle > 180 ? 1 : 0;
        
        // SVG Path command for a wedge
        const pathData = `M ${cx} ${cy} L ${cx} ${cy - r} A ${r} ${r} 0 ${largeArcFlag} 1 ${x2} ${y2} Z`;

        for (let i = 0; i < slices; i++) {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            // Rotate each group to fan them out in a circle
            g.setAttribute("transform", `rotate(${i * sliceAngle}, ${cx}, ${cy})`);
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", pathData);
            path.setAttribute("class", "slice");
            
            // Add a crust rim to the wedge
            const crustRad = r;
            const crustInner = r - 15;
            const cx2_inner = cx + crustInner * Math.sin(rad);
            const cy2_inner = cy - crustInner * Math.cos(rad);
            const crustPathData = `M ${cx} ${cy - crustInner} L ${cx} ${cy - crustRad} A ${crustRad} ${crustRad} 0 ${largeArcFlag} 1 ${x2} ${y2} L ${cx2_inner} ${cy2_inner} A ${crustInner} ${crustInner} 0 ${largeArcFlag} 0 ${cx} ${cy - crustInner} Z`;
            
            const crust = document.createElementNS("http://www.w3.org/2000/svg", "path");
            crust.setAttribute("d", crustPathData);
            crust.setAttribute("class", "crust");
            crust.style.opacity = "0"; // Hidden until slice is filled

            // Interaction
            path.onclick = () => {
                if (isAnimating) return;
                
                // Toggle slice
                if (path.classList.contains('slice-filled')) {
                    path.classList.remove('slice-filled');
                    crust.style.opacity = "0";
                    currentFilled--;
                } else {
                    path.classList.add('slice-filled');
                    crust.style.opacity = "1";
                    currentFilled++;
                }
                
                checkWin();
            };

            g.appendChild(path);
            g.appendChild(crust);
            slicesGroup.appendChild(g);
        }
    }

    function checkWin() {
        if (currentFilled === targetNum) {
            isAnimating = true;
            streak++;
            streakCounter.innerText = `Pizzas Baked: ${streak} 👨‍🍳`;
            
            // Make the fraction pop
            numeratorEl.style.transform = "scale(1.3)";
            denominatorEl.style.transform = "scale(1.3)";
            setTimeout(() => {
                numeratorEl.style.transform = "scale(1)";
                denominatorEl.style.transform = "scale(1)";
            }, 300);

            fireConfetti();
            
            // Wait a moment so they can admire their pizza, then start next round
            setTimeout(initRound, 1500);
        }
    }

    function fireConfetti() {
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        const colors = ['#e65100', '#ffca28', '#4caf50', '#d84315', '#ffb300'];
        
        for (let i = 0; i < 60; i++) {
            const particle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            particle.setAttribute("cx", centerX);
            particle.setAttribute("cy", centerY);
            particle.setAttribute("r", Math.random() * 6 + 3);
            particle.setAttribute("class", "particle");
            particle.style.fill = colors[Math.floor(Math.random() * colors.length)];
            confettiSvg.appendChild(particle);
            
            particle.getBoundingClientRect(); 
            
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 300 + 50; 
            
            particle.setAttribute("cx", centerX + Math.cos(angle) * distance);
            particle.setAttribute("cy", centerY + Math.sin(angle) * distance + 100);
            particle.style.opacity = "0";
            
            setTimeout(() => particle.remove(), 1000);
        }
    }
</script>
</body>
</html>
