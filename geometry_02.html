<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Detective</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #e1f5fe; padding: 20px; color: #01579b;
            margin: 0; overflow-x: hidden; text-align: center;
        }
        
        h1 { color: #0277bd; font-size: 2.5rem; text-shadow: 2px 2px 0px #fff; margin-bottom: 5px; }
        p { font-size: 18px; color: #0288d1; font-weight: bold; margin-top: 0; margin-bottom: 20px;}

        .game-board {
            background: white; padding: 30px; border-radius: 25px; 
            border: 4px solid #81d4fa; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; gap: 20px;
            position: relative; z-index: 10;
        }

        /* Scoreboard */
        #score-board {
            position: absolute; top: -25px; background: #ffca28; color: #e65100;
            padding: 10px 25px; border-radius: 25px; font-size: 24px; font-weight: bold;
            box-shadow: 0 6px 0 #ff8f00; border: 4px solid #fff; transition: transform 0.2s;
        }
        .pop-score { transform: scale(1.2); color: #bf360c !important; }

        /* The Question Display */
        #question-display {
            background-color: #e0f2f1; border: 4px dashed #4db6ac; border-radius: 15px;
            padding: 15px 30px; font-size: 30px; font-weight: bold; color: #00695c;
            width: 80%; box-shadow: inset 0 0 15px rgba(77, 182, 172, 0.2);
        }

        /* --- THE SVG GEOMETRY BOARD --- */
        #geometry-board {
            width: 100%; height: 400px; background: #fafafa;
            border: 4px solid #e0e0e0; border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
            background-image: linear-gradient(#f0f0f0 1px, transparent 1px), linear-gradient(90deg, #f0f0f0 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .polygon-shape {
            fill: rgba(2, 119, 189, 0.1); stroke: #0277bd;
            stroke-width: 6; stroke-linejoin: round;
        }

        .vertex-dot {
            fill: #ff4081; stroke: #fff; stroke-width: 3;
        }

        /* The Options Panel */
        .options-container {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            width: 100%; max-width: 700px; margin-top: 10px;
        }

        .answer-btn {
            background: #ffffff; color: #0277bd; border: 4px solid #81d4fa; border-radius: 15px;
            padding: 15px 30px; font-size: 24px; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 0 #81d4fa; transition: all 0.1s;
        }
        .answer-btn:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #81d4fa; }
        .answer-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #81d4fa; }

        /* Button States */
        .answer-btn.correct { background: #e8f5e9 !important; border-color: #66bb6a !important; color: #2e7d32 !important; box-shadow: 0 6px 0 #66bb6a !important;}
        .answer-btn.wrong { background: #ffebee !important; border-color: #ef5350 !important; color: #c62828 !important; box-shadow: 0 6px 0 #ef5350 !important; animation: shake 0.4s;}
        
        @keyframes shake { 10%, 90% { transform: translate3d(-3px, 0, 0); } 20%, 80% { transform: translate3d(6px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-9px, 0, 0); } 40%, 60% { transform: translate3d(9px, 0, 0); } }

        /* Feedback Area */
        #feedback-area { min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        #feedback-text { font-size: 30px; font-weight: bold; color: #0277bd; display: none;}
        
        #next-btn {
            background-color: #66bb6a; color: white; border: none; border-radius: 15px;
            padding: 15px 40px; font-size: 24px; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 0 #43a047; display: none; margin-top: 10px;
        }
        #next-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #43a047; }

        #confetti-svg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .particle { transition: all 1s cubic-bezier(0.1, 0.8, 0.3, 1); }

    </style>
</head>
<body>
<a href="index.html" id="home-link" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(255,255,255,0.9);border:2px solid #ddd;border-radius:50px;padding:6px 16px;font-family:'Comic Sans MS','Chalkboard SE',cursive;font-size:0.9rem;font-weight:bold;color:#555;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,0.13);white-space:nowrap;" title="Back to Home">&#x1F3E0; Home</a>
    <h1>🕵️‍♂️ Geometry Detective 🕵️‍♂️</h1>
    <p>Count the corners or the sides, then pick the correct name!</p>

    <div class="game-board">
        <div id="score-board">⭐ Score: <span id="score-val">0</span></div>
        
        <div id="question-display">How many sides does this shape have?</div>

        <svg id="geometry-board" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet">
            <polygon id="poly" class="polygon-shape" points=""></polygon>
            </svg>

        <div class="options-container" id="options">
            </div>

        <div id="feedback-area">
            <div id="feedback-text">Bravo! 🌟</div>
            <button id="next-btn" onclick="startRound()">Next Case ➡️</button>
        </div>

    </div>
    
    <svg id="confetti-svg"></svg>

<script>
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playTone(freq, type, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = type; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const svgBoard = document.getElementById('geometry-board');
    const polyEl = document.getElementById('poly');
    const optionsContainer = document.getElementById('options');
    const feedbackText = document.getElementById('feedback-text');
    const nextBtn = document.getElementById('next-btn');
    const scoreVal = document.getElementById('score-val');
    const scoreBoard = document.getElementById('score-board');
    const confettiSvg = document.getElementById('confetti-svg');

    const shapeDictionary = {
        3: "Triangle",
        4: "Quadrilateral",
        5: "Pentagon",
        6: "Hexagon",
        7: "Heptagon",
        8: "Octagon"
    };

    let score = 0;
    let currentCorrectSides = 0;
    let isWaitingForNext = false;

    window.onload = startRound;

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    function startRound() {
        initAudio();
        isWaitingForNext = false;
        
        // Reset UI
        feedbackText.style.display = 'none';
        nextBtn.style.display = 'none';
        optionsContainer.style.opacity = '1';
        optionsContainer.style.pointerEvents = 'auto';

        // 1. Pick random sides (3-8)
        currentCorrectSides = Math.floor(Math.random() * 6) + 3;

        // 2. Generate Chaotic Polygon
        generateRandomPolygon(currentCorrectSides);

        // 3. Generate Multiple Choice Options
        generateOptions(currentCorrectSides);
    }

    // --- RANDOM POLYGON GENERATOR ---
    function generateRandomPolygon(sides) {
        // Clear old dots
        document.querySelectorAll('.vertex-dot').forEach(el => el.remove());

        const points = [];
        const centerX = 400; const centerY = 200;
        
        // How much randomness to add to radius and angle
        const radiusVar = 90; // variability from base radius
        const baseRadius = 100;
        
        // Math Trick: We iterate in a circle, adding random variance to the 
        // angle and radius at every step. This ensures we don't get lines crossing
        // (which creates self-intersecting complex polygons, confusing for kids).
        for (let i = 0; i < sides; i++) {
            // Perfect angle spacing + random variance
            const angle = (i * 2 * Math.PI / sides) + (Math.random() - 0.5) * (Math.PI / sides);
            
            // Random radius variation
            const radius = baseRadius + (Math.random() * radiusVar);

            const x = centerX + radius * Math.cos(angle);
            const y = centerY + radius * Math.sin(angle);
            
            // Constrain to SVG boundaries
            points.push({
                x: Math.max(20, Math.min(780, x)),
                y: Math.max(20, Math.min(380, y))
            });
        }

        // Render Polygon
        const pointsString = points.map(p => `${p.x},${p.y}`).join(' ');
        polyEl.setAttribute('points', pointsString);

        // Render simple red dots at vertices to help counting
        points.forEach(p => {
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute('cx', p.x); circle.setAttribute('cy', p.y);
            circle.setAttribute('r', 6); circle.setAttribute('class', 'vertex-dot');
            svgBoard.appendChild(circle);
        });
    }

    // --- OPTIONS GENERATOR ---
    function generateOptions(correctSides) {
        optionsContainer.innerHTML = '';
        const correctName = shapeDictionary[correctSides];
        
        // Gather 3 distinct wrong answers
        let distractorSides = Object.keys(shapeDictionary)
            .map(Number)
            .filter(s => s !== correctSides);
        
        distractorSides = shuffle(distractorSides).slice(0, 3);
        
        // Combine, shuffle, and render buttons
        const allChoicesText = shuffle([correctSides, ...distractorSides]);

        allChoicesText.forEach(sides => {
            const btn = document.createElement('button');
            btn.className = 'answer-btn';
            btn.innerText = shapeDictionary[sides]; // Show the NAME, not the number
            
            btn.onclick = () => checkAnswer(btn, sides);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(btnEl, chosenSides) {
        if (isWaitingForNext) return;

        if (chosenSides === currentCorrectSides) {
            // CORRECT!
            isWaitingForNext = true;
            btnEl.classList.add('correct');
            optionsContainer.style.pointerEvents = 'none'; // Lock other buttons

            playTone(400, 'sine', 0.1); setTimeout(() => playTone(600, 'sine', 0.1), 100); setTimeout(() => playTone(800, 'sine', 0.4), 200);

            score++;
            scoreVal.innerText = score;
            scoreBoard.classList.add('pop-score');
            setTimeout(() => scoreBoard.classList.remove('pop-score'), 300);

            const titles = ["Detective", "Master", "Expert", "Whiz", "Genius"];
            feedbackText.innerText = `Correct! You are a Shape ${getRandom(titles)}! 🌟`;
            feedbackText.style.display = 'block';
            nextBtn.style.display = 'block';
            fireConfetti();

        } else {
            // WRONG
            playTone(150, 'sawtooth', 0.3);
            btnEl.classList.add('wrong');
            setTimeout(() => btnEl.classList.remove('wrong'), 400); // Reset button so they can try again
        }
    }

    function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function fireConfetti() {
        const cx = window.innerWidth / 2; const cy = window.innerHeight / 2;
        const colors = ['#0277bd', '#ff4081', '#ffca28', '#66bb6a', '#4fc3f7'];
        
        for (let i = 0; i < 40; i++) {
            const p = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            p.setAttribute("cx", cx); p.setAttribute("cy", cy);
            p.setAttribute("r", Math.random() * 6 + 4); p.setAttribute("class", "particle");
            p.style.fill = colors[Math.floor(Math.random() * colors.length)];
            confettiSvg.appendChild(p);
            
            p.getBoundingClientRect(); 
            const angle = Math.random() * Math.PI * 2; const distance = Math.random() * 400 + 100; 
            
            p.setAttribute("cx", cx + Math.cos(angle) * distance);
            p.setAttribute("cy", cy + Math.sin(angle) * distance + 150);
            p.style.opacity = "0";
            
            setTimeout(() => p.remove(), 1000);
        }
    }
</script>
</body>
</html>
