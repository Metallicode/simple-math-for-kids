<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Explorer</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #f3e5f5; padding: 20px; color: #4a148c;
            margin: 0; overflow-x: hidden;
            text-align: center;
        }
        
        h1 { color: #8e24aa; font-size: 2.5rem; text-shadow: 2px 2px 0px #fff; margin-bottom: 5px; }
        p { font-size: 20px; color: #ab47bc; font-weight: bold; margin-top: 0; margin-bottom: 30px;}

        .game-board {
            background: white; padding: 40px 30px 30px 30px; border-radius: 25px; 
            border: 4px solid #ce93d8; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; gap: 30px;
            position: relative; z-index: 10;
        }

        /* Score Badge */
        #score-board {
            position: absolute; top: -25px;
            background: #ffca28; color: #e65100;
            padding: 10px 25px; border-radius: 25px;
            font-size: 26px; font-weight: bold;
            box-shadow: 0 6px 0 #ff8f00; border: 4px solid #fff;
            transition: transform 0.2s;
        }

        .pop-score { transform: scale(1.2); color: #bf360c !important; }

        /* Streak Banner */
        #streak-banner {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #ff5252; color: white;
            padding: 15px 40px; border-radius: 50px;
            font-size: 35px; font-weight: bold;
            box-shadow: 0 10px 25px rgba(255, 82, 82, 0.5);
            border: 4px solid #fff; z-index: 50;
            pointer-events: none; opacity: 0;
        }

        .show-streak {
            animation: roll-anim 2s ease-in-out forwards;
        }

        @keyframes roll-anim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1) rotate(-5deg); }
            45% { transform: translate(-50%, -50%) scale(1) rotate(5deg); }
            60% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        /* The Big Icon Display */
        #icon-display {
            background-color: #fff9c4; border: 4px dashed #ffd54f; border-radius: 50%;
            width: 140px; height: 140px; font-size: 80px; display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 20px rgba(255, 193, 7, 0.3), 0 8px 0 rgba(0,0,0,0.05);
            transition: transform 0.2s; user-select: none;
        }

        .bounce { animation: bounce-anim 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @keyframes bounce-anim {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Word Options */
        .options-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 500px;
        }

        .word-btn {
            background: #ffffff; color: #4a148c;
            border: 4px solid #ba68c8; border-radius: 20px;
            padding: 20px; font-size: 32px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 8px 0 #ba68c8;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: lowercase;
        }

        .word-btn:hover { transform: translateY(-4px); box-shadow: 0 12px 0 #ba68c8; }
        .word-btn:active { transform: translateY(8px); box-shadow: 0 0px 0 #ba68c8; }

        /* Incorrect Guess Animation */
        .wrong-guess {
            background-color: #ffebee !important; color: #d32f2f !important;
            border-color: #ef5350 !important; box-shadow: 0 4px 0 #ef5350 !important;
            transform: translateY(4px) !important;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* Correct Guess Animation */
        .correct-guess {
            background-color: #e8f5e9 !important; color: #2e7d32 !important;
            border-color: #66bb6a !important; box-shadow: 0 4px 0 #66bb6a !important;
            transform: scale(1.1) !important; z-index: 5;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 4px, 0); }
            20%, 80% { transform: translate3d(4px, 4px, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 4px, 0); }
            40%, 60% { transform: translate3d(8px, 4px, 0); }
        }

        /* Feedback Area */
        #feedback-area {
            min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #feedback-text {
            font-size: 40px; font-weight: bold; color: #8e24aa;
            opacity: 0; transition: opacity 0.2s, transform 0.2s;
            transform: scale(0.5); text-shadow: 2px 2px 0px #f3e5f5;
        }

        .show-feedback { opacity: 1 !important; transform: scale(1) !important; }

        /* Restart Button */
        #restart-btn {
            background-color: #42a5f5; color: white; border: none; border-radius: 15px;
            padding: 15px 40px; font-size: 24px; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 0 #1e88e5; display: none; margin-top: 20px;
        }
        #restart-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #1e88e5; }

        /* Confetti */
        #confetti-svg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .particle { transition: all 1s cubic-bezier(0.1, 0.8, 0.3, 1); }

        /* Make it stack nicely on very small phones */
        @media (max-width: 500px) {
            .options-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>📝 Word Explorer 📝</h1>
    <p>Look at the picture and find the matching word!</p>

    <div class="game-board">
        <div id="score-board">⭐ Score: <span id="score-val">0</span> / 50</div>
        
        <div id="streak-banner">🔥 You're on a roll! 🔥</div>

        <div id="icon-display">🍎</div>

        <div class="options-container" id="options">
            </div>

        <div id="feedback-area">
            <div id="feedback-text">Awesome! 🌟</div>
            <button id="restart-btn" onclick="resetGame()">Play Again 🔄</button>
        </div>
    </div>
    
    <svg id="confetti-svg"></svg>

<script>
    const optionsContainer = document.getElementById('options');
    const iconDisplay = document.getElementById('icon-display');
    const feedbackText = document.getElementById('feedback-text');
    const scoreVal = document.getElementById('score-val');
    const scoreBoard = document.getElementById('score-board');
    const streakBanner = document.getElementById('streak-banner');
    const restartBtn = document.getElementById('restart-btn');
    const confettiSvg = document.getElementById('confetti-svg');

    // Kid-friendly visual dictionary
    const dictionary = [
        { icon: "🍎", word: "apple" }, { icon: "🐶", word: "dog" },
        { icon: "🐱", word: "cat" },   { icon: "🚗", word: "car" },
        { icon: "☀️", word: "sun" },   { icon: "🌙", word: "moon" },
        { icon: "⭐", word: "star" },  { icon: "🌳", word: "tree" },
        { icon: "🐟", word: "fish" },  { icon: "🐦", word: "bird" },
        { icon: "🐸", word: "frog" },  { icon: "🐷", word: "pig" },
        { icon: "🐄", word: "cow" },   { icon: "🐻", word: "bear" },
        { icon: "⚽", word: "ball" },  { icon: "🎈", word: "balloon" },
        { icon: "🚲", word: "bike" },  { icon: "🚂", word: "train" },
        { icon: "🚀", word: "rocket" },{ icon: "🏠", word: "house" },
        { icon: "🍌", word: "banana" },{ icon: "🦆", word: "duck" },
        { icon: "🦁", word: "lion" },  { icon: "🐘", word: "elephant" },
        { icon: "🐢", word: "turtle" },{ icon: "📚", word: "book" },
        { icon: "👑", word: "crown" }, { icon: "🔥", word: "fire" },
        { icon: "🍓", word: "strawberry" }, { icon: "🍕", word: "pizza" }
    ];

    let currentItem = null;
    let isWaitingForNext = false;
    let isShaking = false; 

    // Game Progress Variables
    let score = 0;
    let currentStreak = 0;
    let targetStreak = getRandomStreakTarget();

    window.onload = startRound;

    function getRandomStreakTarget() {
        return Math.floor(Math.random() * 4) + 4; // Target is 4, 5, 6, or 7
    }

    function resetGame() {
        score = 0;
        currentStreak = 0;
        targetStreak = getRandomStreakTarget();
        scoreVal.innerText = score;
        restartBtn.style.display = 'none';
        iconDisplay.style.display = 'flex';
        feedbackText.innerText = "Awesome! 🌟";
        startRound();
    }

    function startRound() {
        isWaitingForNext = false;
        isShaking = false;
        optionsContainer.innerHTML = '';
        confettiSvg.innerHTML = '';
        feedbackText.classList.remove('show-feedback');
        
        // Add a fun little bounce to the new picture
        iconDisplay.classList.remove('bounce');
        void iconDisplay.offsetWidth; // Trigger reflow to restart animation
        iconDisplay.classList.add('bounce');

        // 1. Pick the correct item
        currentItem = dictionary[Math.floor(Math.random() * dictionary.length)];
        iconDisplay.innerText = currentItem.icon;

        // 2. Pick 3 random distractors (make sure they aren't the correct word)
        let options = [currentItem.word];
        while (options.length < 4) {
            let randomItem = dictionary[Math.floor(Math.random() * dictionary.length)];
            if (!options.includes(randomItem.word)) {
                options.push(randomItem.word);
            }
        }

        // 3. Shuffle the options
        options.sort(() => Math.random() - 0.5);

        // 4. Create the buttons
        options.forEach(word => {
            const btn = document.createElement('button');
            btn.className = 'word-btn';
            btn.innerText = word; 
            btn.onclick = () => handleGuess(btn, word);
            optionsContainer.appendChild(btn);
        });
    }

    function handleGuess(btnElement, guessedWord) {
        if (isWaitingForNext || isShaking) return;

        if (guessedWord === currentItem.word) {
            // --- CORRECT GUESS ---
            isWaitingForNext = true;
            btnElement.classList.add('correct-guess');
            
            // Dim wrong options
            Array.from(optionsContainer.children).forEach(child => {
                if (child !== btnElement) child.style.opacity = '0.3';
            });

            // Update Score & Streak
            score++;
            currentStreak++;
            scoreVal.innerText = score;
            
            scoreBoard.classList.add('pop-score');
            setTimeout(() => scoreBoard.classList.remove('pop-score'), 300);

            feedbackText.classList.add('show-feedback');
            fireConfetti();

            // Win Condition Check
            if (score >= 50) {
                triggerWin();
                return; 
            }

            // Streak Animation Check
            let delayNextRound = 1000; 

            if (currentStreak === targetStreak) {
                streakBanner.classList.add('show-streak');
                setTimeout(() => streakBanner.classList.remove('show-streak'), 2000);
                
                currentStreak = 0;
                targetStreak = getRandomStreakTarget();
                delayNextRound = 2200; // Wait longer so they see the banner
            }

            // Auto-advance
            setTimeout(startRound, delayNextRound);

        } else {
            // --- INCORRECT GUESS ---
            isShaking = true;
            currentStreak = 0; 
            targetStreak = getRandomStreakTarget(); 
            
            btnElement.classList.add('wrong-guess');
            
            setTimeout(() => {
                btnElement.classList.remove('wrong-guess');
                isShaking = false;
            }, 500);
        }
    }

    function triggerWin() {
        optionsContainer.innerHTML = '';
        iconDisplay.style.display = 'none';
        
        feedbackText.innerText = "🏆 YOU WIN! 🏆";
        feedbackText.style.fontSize = "60px";
        feedbackText.classList.add('show-feedback');
        
        restartBtn.style.display = 'block';
        fireConfetti(true);
    }

    function fireConfetti(isMassive = false) {
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        const colors = ['#ba68c8', '#4dd0e1', '#81c784', '#fff176', '#ffb74d', '#f06292'];
        
        const particleCount = isMassive ? 150 : 40;
        
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            particle.setAttribute("cx", centerX);
            particle.setAttribute("cy", centerY);
            particle.setAttribute("r", Math.random() * 6 + 4);
            particle.setAttribute("class", "particle");
            particle.style.fill = colors[Math.floor(Math.random() * colors.length)];
            confettiSvg.appendChild(particle);
            
            particle.getBoundingClientRect(); 
            
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * (isMassive ? 800 : 400) + 100; 
            
            particle.setAttribute("cx", centerX + Math.cos(angle) * distance);
            particle.setAttribute("cy", centerY + Math.sin(angle) * distance + (isMassive ? 200 : 150));
            particle.style.opacity = "0";
            
            setTimeout(() => particle.remove(), 1500);
        }
    }
</script>
</body>
</html>
