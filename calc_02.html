<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Line Math</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #f3e5f5; padding: 20px; color: #37474f;
            margin: 0;
        }
        
        h1 { color: #8e24aa; font-size: 2.5rem; text-shadow: 2px 2px 0px #fff; margin-bottom: 10px; text-align: center; }

        .controls { 
            background: white; padding: 25px; border-radius: 25px; 
            border: 4px solid #ce93d8; box-shadow: 0 8px 0 #ce93d8;
            margin-bottom: 30px; display: flex; gap: 15px; align-items: center; 
            flex-wrap: wrap; justify-content: center;
        }
        
        input { 
            width: 80px; height: 60px; font-size: 32px; text-align: center; 
            border: 4px solid #ffb300; border-radius: 15px; 
            color: #d84315; font-family: inherit; font-weight: bold;
        }
        
        select { 
            font-size: 32px; border: 4px solid #ffb300; border-radius: 15px; 
            cursor: pointer; height: 68px; color: #d84315; font-family: inherit; font-weight: bold;
        }
        
        button { 
            font-size: 24px; padding: 15px 30px; font-family: inherit; font-weight: bold;
            background-color: #26c6da; color: white; border: none; border-radius: 15px; 
            cursor: pointer; box-shadow: 0 6px 0 #00acc1; transition: 0.1s; 
        }
        
        button:active { transform: translateY(6px); box-shadow: 0 0px 0 #00acc1; }
        button:disabled { background-color: #b2ebf2; box-shadow: 0 6px 0 #80deea; cursor: not-allowed; }

        #canvas-container { 
            background: white; border-radius: 25px; border: 4px solid #eceff1;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); overflow: hidden; position: relative;
            width: 100%; max-width: 900px;
        }
        
        svg { width: 100%; height: auto; display: block; }

        .jump-arc {
            fill: none;
            stroke-width: 5;
            stroke-linecap: round;
        }

        .jump-label {
            font-size: 18px;
            font-weight: bold;
            fill: #ff7043;
            text-anchor: middle;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #result-text { 
            font-size: 50px; font-weight: bold; margin-top: 20px; 
            color: #8e24aa; min-height: 70px; text-shadow: 2px 2px 0px #fff;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .pop { transform: scale(1.3); color: #d84315 !important; }

        .particle {
            transition: all 1s cubic-bezier(0.1, 0.8, 0.3, 1);
            pointer-events: none;
        }
    </style>
</head>
<body>
<a href="index.html" id="home-link" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(255,255,255,0.9);border:2px solid #ddd;border-radius:50px;padding:6px 16px;font-family:'Comic Sans MS','Chalkboard SE',cursive;font-size:0.9rem;font-weight:bold;color:#555;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,0.13);white-space:nowrap;" title="Back to Home">&#x1F3E0; Home</a>
    <h1>🐸 Number Line Jumps! 🐸</h1>

    <div class="controls">
        <input type="number" id="num1" value="3" min="-20" max="50">
        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="x">x</option>
        </select>
        <input type="number" id="num2" value="4" min="0" max="50">
        <button id="calcBtn" onclick="startCalculation()">Jump!</button>
    </div>

    <div id="canvas-container">
        <svg id="viz" viewBox="0 0 900 400">
            <g id="axisGroup"></g>
            <g id="jumpsGroup"></g>
            <circle id="startDot" r="8" fill="#ff7043" opacity="0" />
            <text id="startText" font-size="20" font-weight="bold" fill="#d84315" text-anchor="middle" opacity="0">Start</text>
        </svg>
    </div>

    <div id="result-text"></div>

<script>
    const svg = document.getElementById('viz');
    const axisGroup = document.getElementById('axisGroup');
    const jumpsGroup = document.getElementById('jumpsGroup');
    const resultText = document.getElementById('result-text');
    const calcBtn = document.getElementById('calcBtn');
    const startDot = document.getElementById('startDot');
    const startText = document.getElementById('startText');

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    const BASE_TEMPO = 600; // Slightly faster for hops

    // Axis Settings
    const paddingX = 50; 
    const svgWidth = 900;
    const yAxis = 300; // Vertical position of the line

    let minVal, maxVal, unitsPerPixel, tickStep;

    function triggerExplosion(centerX, centerY) {
        const colors = ['#ffeb3b', '#ff4081', '#00e5ff', '#76ff03', '#ab47bc'];
        for (let i = 0; i < 50; i++) {
            const particle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            particle.setAttribute("cx", centerX);
            particle.setAttribute("cy", centerY);
            particle.setAttribute("r", Math.random() * 6 + 3);
            particle.setAttribute("class", "particle");
            particle.style.fill = colors[Math.floor(Math.random() * colors.length)];
            svg.appendChild(particle);
            
            particle.getBoundingClientRect();
            
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 200 + 50;
            particle.setAttribute("cx", centerX + Math.cos(angle) * distance);
            particle.setAttribute("cy", centerY + Math.sin(angle) * distance);
            particle.style.opacity = "0";
            setTimeout(() => particle.remove(), 1000);
        }
    }

    // Maps a number to its X pixel coordinate
    function valToX(value) {
        return paddingX + ((value - minVal) / (maxVal - minVal)) * (svgWidth - paddingX * 2);
    }

    function setupAxis(n1, n2, op) {
        // 1. Calculate the range needed
        let pointsToCover = [0]; // Always include 0 for reference
        if (op === '+') {
            pointsToCover.push(n1, n1 + n2);
        } else if (op === '-') {
            pointsToCover.push(n1, n1 - n2);
        } else if (op === 'x') {
            pointsToCover.push(n1 * n2);
        }

        let calculatedMin = Math.min(...pointsToCover);
        let calculatedMax = Math.max(...pointsToCover);

        // Add some breathing room to the edges
        let range = calculatedMax - calculatedMin;
        if (range === 0) range = 10;
        
        minVal = Math.floor(calculatedMin - (range * 0.1) - 1);
        maxVal = Math.ceil(calculatedMax + (range * 0.1) + 1);
        range = maxVal - minVal;

        // 2. Determine tick frequency (so it doesn't get crowded)
        if (range <= 25) tickStep = 1;
        else if (range <= 50) tickStep = 2;
        else if (range <= 100) tickStep = 5;
        else if (range <= 250) tickStep = 10;
        else tickStep = 25;

        // 3. Draw Axis Line
        axisGroup.innerHTML = '';
        const mainLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
        mainLine.setAttribute("x1", valToX(minVal)); mainLine.setAttribute("y1", yAxis);
        mainLine.setAttribute("x2", valToX(maxVal)); mainLine.setAttribute("y2", yAxis);
        mainLine.setAttribute("stroke", "#78909c"); mainLine.setAttribute("stroke-width", "6");
        mainLine.setAttribute("stroke-linecap", "round");
        axisGroup.appendChild(mainLine);

        // 4. Draw Ticks & Labels
        for (let i = Math.ceil(minVal); i <= Math.floor(maxVal); i++) {
            const isZero = (i === 0);
            const isMajor = (i % tickStep === 0);
            
            if (isMajor || isZero) {
                const x = valToX(i);
                
                // Tick line
                const tick = document.createElementNS("http://www.w3.org/2000/svg", "line");
                tick.setAttribute("x1", x); tick.setAttribute("y1", isZero ? yAxis - 15 : yAxis - 10);
                tick.setAttribute("x2", x); tick.setAttribute("y2", isZero ? yAxis + 15 : yAxis + 10);
                tick.setAttribute("stroke", isZero ? "#e53935" : "#b0bec5");
                tick.setAttribute("stroke-width", isZero ? "4" : "3");
                axisGroup.appendChild(tick);

                // Number text
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", x); text.setAttribute("y", yAxis + 35);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("font-size", isZero ? "22" : "18");
                text.setAttribute("font-weight", isZero ? "bold" : "normal");
                text.setAttribute("fill", isZero ? "#e53935" : "#546e7a");
                text.textContent = i;
                axisGroup.appendChild(text);
            }
        }
    }

    async function drawJump(startVal, endVal, labelText, color) {
        const x1 = valToX(startVal);
        const x2 = valToX(endVal);
        
        // Dynamic arc height based on distance
        const distance = Math.abs(x2 - x1);
        let arcHeight = Math.min(120, Math.max(40, distance * 0.4));
        const midX = (x1 + x2) / 2;
        const midY = yAxis - arcHeight;

        // Path drawing
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        const d = `M ${x1} ${yAxis} Q ${midX} ${midY} ${x2} ${yAxis}`;
        path.setAttribute("d", d);
        path.setAttribute("class", "jump-arc");
        path.setAttribute("stroke", color);

        jumpsGroup.appendChild(path);

        // Animate the line drawing
        const length = path.getTotalLength();
        path.style.strokeDasharray = length;
        path.style.strokeDashoffset = length;
        
        // Force browser redraw
        path.getBoundingClientRect();
        
        path.style.transition = `stroke-dashoffset ${BASE_TEMPO}ms ease-in-out`;
        path.style.strokeDashoffset = "0";

        // Draw Landing Dot
        const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        dot.setAttribute("cx", x2); dot.setAttribute("cy", yAxis);
        dot.setAttribute("r", "6"); dot.setAttribute("fill", color);
        dot.style.opacity = "0";
        jumpsGroup.appendChild(dot);

        // Draw Label above jump
        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("x", midX); label.setAttribute("y", midY - 10);
        label.setAttribute("class", "jump-label");
        label.style.fill = color;
        label.textContent = labelText;
        jumpsGroup.appendChild(label);

        await sleep(BASE_TEMPO);
        
        dot.style.transition = "opacity 0.2s";
        dot.style.opacity = "1";
        label.style.opacity = "1";
        
        await sleep(200); // Tiny pause before next hop
    }

    async function startCalculation() {
        calcBtn.disabled = true; 
        resultText.classList.remove('pop');
        jumpsGroup.innerHTML = ''; 
        startDot.style.opacity = "0";
        startText.style.opacity = "0";
        
        const n1 = parseInt(document.getElementById('num1').value) || 0;
        const n2 = parseInt(document.getElementById('num2').value) || 0;
        const op = document.getElementById('operator').value;
        
        resultText.innerText = `${n1} ${op} ${n2} = ?`;
        
        // 1. Draw the axis automatically scaled
        setupAxis(n1, n2, op);

        await sleep(500);

        // 2. Plot the starting point
        let startPoint = (op === 'x') ? 0 : n1;
        startDot.setAttribute("cx", valToX(startPoint));
        startDot.setAttribute("cy", yAxis);
        startText.setAttribute("x", valToX(startPoint));
        startText.setAttribute("y", yAxis - 15);
        
        startDot.style.transition = "opacity 0.5s";
        startText.style.transition = "opacity 0.5s";
        startDot.style.opacity = "1";
        startText.style.opacity = "1";

        await sleep(800);

        // 3. Execute Jumps
        let currentVal = startPoint;
        let finalResult = 0;

        if (op === '+') {
            for (let i = 0; i < n2; i++) {
                await drawJump(currentVal, currentVal + 1, "+1", "#4CAF50"); // Green jumps right
                currentVal += 1;
            }
            finalResult = n1 + n2;
        } 
        else if (op === '-') {
            for (let i = 0; i < n2; i++) {
                await drawJump(currentVal, currentVal - 1, "-1", "#e53935"); // Red jumps left
                currentVal -= 1;
            }
            finalResult = n1 - n2;
        } 
        else if (op === 'x') {
            for (let i = 0; i < n1; i++) {
                await drawJump(currentVal, currentVal + n2, `+${n2}`, "#9c27b0"); // Purple jumps sizing n2
                currentVal += n2;
            }
            finalResult = n1 * n2;
        }

        await sleep(500);
        finalizeResult(n1, n2, finalResult, op, valToX(finalResult), yAxis);
        
        calcBtn.disabled = false;
    }

    function finalizeResult(n1, n2, result, operator, explodeX, explodeY) {
        resultText.innerText = `${n1} ${operator} ${n2} = ${result}`;
        resultText.classList.add('pop'); 
        triggerExplosion(explodeX, explodeY); 
        
        // Highlight final destination
        const destCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        destCircle.setAttribute("cx", explodeX);
        destCircle.setAttribute("cy", explodeY);
        destCircle.setAttribute("r", "12");
        destCircle.setAttribute("fill", "none");
        destCircle.setAttribute("stroke", "#ffb300");
        destCircle.setAttribute("stroke-width", "4");
        jumpsGroup.appendChild(destCircle);
    }
</script>
</body>
</html>
