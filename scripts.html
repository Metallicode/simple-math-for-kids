<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Log: Accessible Reading</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #f3e5f5; padding: 20px; color: #4a148c;
            margin: 0; overflow-x: hidden;
        }
        
        h1 { color: #8e24aa; font-size: 2.5rem; text-shadow: 2px 2px 0px #fff; margin-bottom: 5px; text-align: center;}
        p { font-size: 20px; color: #ab47bc; font-weight: bold; margin-top: 0; margin-bottom: 20px; text-align: center;}

        /* --- PRIZE SHELF --- */
        #prize-shelf {
            background: #fff; border: 4px solid #fbc02d; border-radius: 20px;
            padding: 10px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px;
            font-size: 24px; font-weight: bold; color: #f57c00;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1); min-height: 60px; min-width: 300px;
            max-width: 900px; width: 100%; box-sizing: border-box; flex-wrap: wrap;
        }

        #prize-list { display: flex; gap: 10px; flex-wrap: wrap; }
        .collected-prize { font-size: 35px; animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .game-wrapper {
            display: flex; gap: 20px; width: 100%; max-width: 950px;
            flex-direction: row; align-items: flex-start; justify-content: center;
        }

        /* --- LEFT SIDE: The Script / Quest Log --- */
        .quest-log {
            background: #fff; border: 4px solid #ce93d8; border-radius: 20px;
            padding: 20px; width: 350px; flex-shrink: 0; box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }

        .quest-title {
            font-size: 24px; font-weight: bold; color: #6a1b9a;
            border-bottom: 3px dashed #e1bee7; padding-bottom: 10px; margin-bottom: 15px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .step-container { display: flex; flex-direction: column; gap: 10px; }

        .step {
            padding: 15px; border-radius: 15px; font-size: 20px; font-weight: bold;
            display: flex; align-items: center; gap: 10px;
            transition: all 0.3s; border: 2px solid transparent; line-height: 1.3;
        }

        .step-number {
            background: #e1bee7; color: #6a1b9a; width: 30px; height: 30px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            flex-shrink: 0; font-size: 18px;
        }

        .step.locked { opacity: 0; transform: translateY(20px); pointer-events: none; display: none; }
        .step.active { 
            background: #f3e5f5; border-color: #ab47bc; color: #4a148c;
            box-shadow: 0 4px 0 #ce93d8; display: flex;
            animation: slide-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .step.active .step-number { background: #ab47bc; color: white; }
        
        .step.completed { background: #e8f5e9; border-color: #81c784; color: #2e7d32; display: flex; opacity: 0.5; }
        .step.completed .step-number { background: #66bb6a; color: white; }

        @keyframes slide-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- RIGHT SIDE: The Interactive Play Area --- */
        .play-area {
            background: white; border: 4px solid #90caf9; border-radius: 20px;
            width: 100%; min-height: 450px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); padding: 20px; overflow: hidden; gap: 20px;
        }

        /* Buttons Task */
        .button-row { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .interactive-btn {
            padding: 15px 30px; font-size: 24px; font-weight: bold; border-radius: 15px;
            border: none; cursor: pointer; transition: 0.1s; color: white;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2); text-transform: capitalize;
        }
        .interactive-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 transparent; }
        .btn-red { background: #ef5350; } .btn-blue { background: #42a5f5; } 
        .btn-green { background: #66bb6a; } .btn-yellow { background: #ffee58; color: #f57c00; }
        .btn-purple { background: #ab47bc; } .btn-orange { background: #ffa726; } .btn-pink { background: #f06292; }

        /* Scatter/Counting Task */
        .scatter-container { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; 
            background: #f1f8e9; padding: 20px; border-radius: 20px; border: 3px dashed #c5e1a5;
        }
        .emoji-item { font-size: 55px; user-select: none; }
        
        .number-pad { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .num-btn {
            width: 70px; height: 70px; font-size: 35px; font-weight: bold;
            background: #fff9c4; border: 4px solid #ffee58; border-radius: 15px;
            color: #f57c00; cursor: pointer; box-shadow: 0 4px 0 #fbc02d; transition: 0.1s;
        }
        .num-btn:active { transform: translateY(4px); box-shadow: 0 0px 0 transparent; }

        /* Action Task (Drag or Click) */
        .zones-container { display: flex; gap: 30px; justify-content: center; width: 100%; margin-bottom: 20px; }
        .items-container { display: flex; gap: 30px; justify-content: center; width: 100%; }
        
        .drop-zone {
            width: 140px; height: 140px; border: 6px dashed #bdbdbd; border-radius: 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            font-size: 70px; background: #fafafa; position: relative; cursor: pointer; transition: 0.2s;
        }
        .drop-zone:hover { box-shadow: inset 0 0 15px rgba(0,0,0,0.1); border-color: #90caf9;}
        
        .draggable { 
            width: 90px; height: 90px; font-size: 60px; background: white; 
            border: 4px solid #e0e0e0; border-radius: 50%; display: flex; 
            justify-content: center; align-items: center; box-shadow: 0 6px 0 #bdbdbd; 
            cursor: pointer; z-index: 20; touch-action: none; transition: transform 0.1s;
        }
        .draggable:hover { transform: scale(1.1); }
        .is-dragging { transition: none !important; transform: scale(1.2); opacity: 0.9; z-index: 100; box-shadow: 0 15px 20px rgba(0,0,0,0.3); }
        
        /* New Click-Selection State */
        .is-selected {
            border-color: #ff9800 !important;
            box-shadow: 0 0 20px rgba(255, 152, 0, 0.6), 0 6px 0 #f57c00 !important;
            animation: gentle-pulse 1s infinite alternate;
        }
        @keyframes gentle-pulse { from { transform: scale(1.1); } to { transform: scale(1.15); } }

        /* Animations */
        .wrong-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both !important; }
        @keyframes shake { 10%, 90% { transform: translate3d(-4px, 0, 0); } 20%, 80% { transform: translate3d(8px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-12px, 0, 0); } 40%, 60% { transform: translate3d(12px, 0, 0); } }

        /* Prize Chest */
        .chest { font-size: 130px; cursor: pointer; transition: transform 0.2s; user-select: none; }
        .chest:hover { transform: scale(1.1); }
        .chest-shake { animation: chest-wobble 0.5s infinite; }
        @keyframes chest-wobble { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } }
        
        .prize-emoji { font-size: 150px; animation: pop-up 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop-in { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes pop-up { 0% { transform: scale(0) translateY(50px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }

        #next-quest-btn {
            background-color: #ffb74d; color: white; border: none; border-radius: 15px;
            padding: 15px 40px; font-size: 24px; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 0 #f57c00; margin-top: 20px; display: none;
        }

        #confetti-svg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .particle { transition: all 1s cubic-bezier(0.1, 0.8, 0.3, 1); }

        @media (max-width: 750px) {
            .game-wrapper { flex-direction: column; align-items: center; }
            .quest-log { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <h1>📜 Quest Log 📜</h1>
    <p>Follow the steps carefully to unlock treasure!</p>

    <div id="prize-shelf">
        <span>🏆 Prizes: </span>
        <div id="prize-list"></div>
    </div>

    <div class="game-wrapper">
        <div class="quest-log">
            <div class="quest-title" id="quest-title">Loading Quest...</div>
            <div class="step-container" id="step-container"></div>
        </div>
        <div class="play-area" id="play-area"></div>
    </div>

    <button id="next-quest-btn" onclick="startProceduralQuest()">Start New Adventure ➡️</button>
    <svg id="confetti-svg"></svg>

<script>
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playTone(freq, type, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = type; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const playArea = document.getElementById('play-area');
    const stepContainer = document.getElementById('step-container');
    const questTitle = document.getElementById('quest-title');
    const nextQuestBtn = document.getElementById('next-quest-btn');
    const confettiSvg = document.getElementById('confetti-svg');
    const prizeList = document.getElementById('prize-list');

    // Global State
    let sessionPrizes = [];
    let selectedItemEl = null; // Tracks the currently clicked item
    let isWaitingForNext = false;

    // --- PROCEDURAL GENERATION DICTIONARIES ---
    const colors = ['red', 'blue', 'green', 'yellow', 'purple', 'orange', 'pink'];
    
    // Expanded Dictionaries
    const animals = [ 
        {id: 'dog', em: '🐶'}, {id: 'cat', em: '🐱'}, {id: 'pig', em: '🐷'}, {id: 'cow', em: '🐮'}, 
        {id: 'fox', em: '🦊'}, {id: 'bear', em: '🐻'}, {id: 'frog', em: '🐸'}, {id: 'monkey', em: '🐵'},
        {id: 'lion', em: '🦁'}, {id: 'turtle', em: '🐢'}
    ];
    
    const foods = [ 
        {id: 'apple', em: '🍎'}, {id: 'banana', em: '🍌'}, {id: 'bone', em: '🦴'}, {id: 'cheese', em: '🧀'},
        {id: 'carrot', em: '🥕'}, {id: 'broccoli', em: '🥦'}, {id: 'donut', em: '🍩'}, {id: 'cookie', em: '🍪'}
    ];

    const prizesPool = ['💎', '👑', '🎸', '🎮', '🦖', '🦄', '🏆', '🍕', '🚀', '⚽', '🎨', '🧸'];

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }
    function getRandom(arr, count = 1) { const shuffled = shuffle([...arr]); return count === 1 ? shuffled[0] : shuffled.slice(0, count); }

    // --- STEP GENERATORS ---

    function genClickStep() {
        const targetColor = getRandom(colors);
        return {
            text: `Click the ${targetColor} button.`,
            setup: (completeCallback) => {
                playArea.innerHTML = '';
                let row = document.createElement('div');
                row.className = 'button-row';
                
                // Pick the target + 3 random distractors
                let roundColors = [targetColor, ...getRandom(colors.filter(c => c !== targetColor), 3)];
                
                shuffle(roundColors).forEach(c => {
                    let btn = document.createElement('button');
                    btn.className = `interactive-btn btn-${c}`;
                    btn.innerText = c;
                    btn.onclick = () => {
                        if (isWaitingForNext) return;
                        if (c === targetColor) completeCallback();
                        else triggerError(btn);
                    };
                    row.appendChild(btn);
                });
                playArea.appendChild(row);
            }
        };
    }

    function genCountStep() {
        const targetAnim = getRandom(animals);
        const distractorAnim = getRandom(animals.filter(a => a.id !== targetAnim.id));
        
        const targetCount = Math.floor(Math.random() * 4) + 2; // 2 to 5
        const distractorCount = Math.floor(Math.random() * 3) + 2; // 2 to 4
        
        return {
            text: `Count the ${targetAnim.id}s.`,
            setup: (completeCallback) => {
                playArea.innerHTML = '';
                
                let scatter = document.createElement('div');
                scatter.className = 'scatter-container';
                
                let scatterItems = [];
                for(let i=0; i<targetCount; i++) scatterItems.push(targetAnim.em);
                for(let i=0; i<distractorCount; i++) scatterItems.push(distractorAnim.em);
                scatterItems = shuffle(scatterItems);
                
                scatterItems.forEach(em => {
                    let el = document.createElement('div');
                    el.className = 'emoji-item'; el.innerText = em;
                    scatter.appendChild(el);
                });
                playArea.appendChild(scatter);

                let pad = document.createElement('div');
                pad.className = 'number-pad';
                [1, 2, 3, 4, 5, 6, 7].forEach(n => {
                    let btn = document.createElement('button');
                    btn.className = 'num-btn'; btn.innerText = n;
                    btn.onclick = () => {
                        if (isWaitingForNext) return;
                        if (n === targetCount) completeCallback();
                        else triggerError(btn);
                    };
                    pad.appendChild(btn);
                });
                playArea.appendChild(pad);
            }
        };
    }

    function genActionStep() {
        const roundFoods = getRandom(foods, 2); 
        const roundAnimals = getRandom(animals, 2); 
        
        const targetFood = roundFoods[0];
        const targetAnimal = roundAnimals[0];

        return {
            text: `Give the ${targetFood.id} to the ${targetAnimal.id}.`,
            setup: (completeCallback) => {
                playArea.innerHTML = '';
                selectedItemEl = null; // Reset selection state
                
                let zonesDiv = document.createElement('div');
                zonesDiv.className = 'zones-container';
                
                shuffle(roundAnimals).forEach(animal => {
                    let zone = document.createElement('div');
                    zone.className = 'drop-zone'; 
                    zone.dataset.id = animal.id;
                    zone.innerText = animal.em;
                    
                    // Allow clicking a zone to send the selected item there
                    zone.onclick = () => {
                        if (isWaitingForNext || !selectedItemEl) return;
                        
                        const itemToMove = selectedItemEl;
                        itemToMove.classList.remove('is-selected');
                        selectedItemEl = null;

                        // Calculate flight path
                        const itemRect = itemToMove.getBoundingClientRect();
                        const zoneRect = zone.getBoundingClientRect();
                        const flightX = (zoneRect.left + zoneRect.width/2) - (itemRect.left + itemRect.width/2);
                        const flightY = (zoneRect.top + zoneRect.height/2) - (itemRect.top + itemRect.height/2);

                        itemToMove.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)';
                        itemToMove.style.transform = `translate(${flightX}px, ${flightY}px) scale(1.1)`;

                        setTimeout(() => {
                            itemToMove.style.transition = ''; // clear transition for logic evaluation
                            evaluateAction(itemToMove, animal.id, targetFood.id, targetAnimal.id, completeCallback);
                        }, 300);
                    };

                    zonesDiv.appendChild(zone);
                });

                let itemsDiv = document.createElement('div');
                itemsDiv.className = 'items-container';
                
                shuffle(roundFoods).forEach(food => {
                    let item = document.createElement('div');
                    item.className = 'draggable'; 
                    item.dataset.id = food.id;
                    item.innerText = food.em;
                    
                    setupDualPhysics(item, targetFood.id, targetAnimal.id, completeCallback);
                    itemsDiv.appendChild(item);
                });

                playArea.appendChild(zonesDiv);
                playArea.appendChild(itemsDiv);
            }
        };
    }

    // --- ENGINE LOGIC ---
    let currentQuestSteps = [];
    let currentStepIndex = 0;
    
    window.onload = startProceduralQuest;

    function startProceduralQuest() {
        initAudio();
        isWaitingForNext = false;
        nextQuestBtn.style.display = 'none';
        
        const questNames = ["The Secret Mission", "The Zoo Keeper", "The Magic Code", "The Farm Helper", "The Hungry Pets"];
        questTitle.innerText = getRandom(questNames);
        
        currentQuestSteps = [genClickStep(), genCountStep(), genActionStep()];
        currentStepIndex = 0;
        
        stepContainer.innerHTML = '';

        currentQuestSteps.forEach((step, index) => {
            let stepDiv = document.createElement('div');
            stepDiv.className = `step ${index === 0 ? 'active' : 'locked'}`;
            stepDiv.id = `step-${index}`;
            
            let numCircle = document.createElement('div');
            numCircle.className = 'step-number'; numCircle.innerText = index + 1;
            
            let textSpan = document.createElement('span'); textSpan.innerText = step.text;

            stepDiv.appendChild(numCircle); stepDiv.appendChild(textSpan);
            stepContainer.appendChild(stepDiv);
        });

        loadCurrentStep();
    }

    function loadCurrentStep() {
        playArea.innerHTML = ''; 
        isWaitingForNext = false;
        currentQuestSteps[currentStepIndex].setup(completeStep);
    }

    function completeStep() {
        isWaitingForNext = true;
        initAudio();
        playTone(600, 'sine', 0.1); setTimeout(() => playTone(800, 'sine', 0.2), 150);

        const currentStepEl = document.getElementById(`step-${currentStepIndex}`);
        currentStepEl.classList.remove('active');
        currentStepEl.classList.add('completed');
        currentStepEl.querySelector('.step-number').innerText = '✓';

        currentStepIndex++;

        if (currentStepIndex >= currentQuestSteps.length) {
            setTimeout(triggerWin, 500);
        } else {
            const nextStepEl = document.getElementById(`step-${currentStepIndex}`);
            nextStepEl.classList.remove('locked');
            nextStepEl.classList.add('active');
            setTimeout(loadCurrentStep, 300);
        }
    }

    function triggerError(element) {
        initAudio(); playTone(200, 'sawtooth', 0.2);
        element.classList.add('wrong-shake');
        setTimeout(() => element.classList.remove('wrong-shake'), 400);
    }

    // --- DUAL PHYSICS ENGINE (Drag OR Click) ---
    function setupDualPhysics(itemEl, correctItemId, correctZoneId, onSuccess) {
        let startX = 0, startY = 0;
        
        const move = (e) => {
            const dx = e.clientX - startX; const dy = e.clientY - startY;
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                itemEl.style.transform = `translate(${dx}px, ${dy}px) scale(1.1)`;
                if (selectedItemEl) {
                    selectedItemEl.classList.remove('is-selected');
                    selectedItemEl = null;
                }
            }
        };
        
        const up = (e) => {
            window.removeEventListener('pointermove', move);
            window.removeEventListener('pointerup', up);
            itemEl.classList.remove('is-dragging');

            const dx = Math.abs(e.clientX - startX);
            const dy = Math.abs(e.clientY - startY);

            // SMART CLICK DETECTION
            if (dx < 5 && dy < 5) {
                itemEl.style.transform = `translate(0px, 0px)`;
                if (selectedItemEl === itemEl) {
                    itemEl.classList.remove('is-selected');
                    selectedItemEl = null;
                } else {
                    if (selectedItemEl) selectedItemEl.classList.remove('is-selected');
                    selectedItemEl = itemEl;
                    itemEl.classList.add('is-selected');
                }
                return;
            }

            // It was a drag. Check collisions.
            const itemRect = itemEl.getBoundingClientRect();
            const zones = document.querySelectorAll('.drop-zone');
            let droppedZoneId = null;

            zones.forEach(zone => {
                const zoneRect = zone.getBoundingClientRect();
                if (!(itemRect.right < zoneRect.left || itemRect.left > zoneRect.right || 
                      itemRect.bottom < zoneRect.top || itemRect.top > zoneRect.bottom)) {
                    droppedZoneId = zone.dataset.id;
                }
            });

            evaluateAction(itemEl, droppedZoneId, correctItemId, correctZoneId, onSuccess);
        };

        itemEl.addEventListener('pointerdown', (e) => {
            if (isWaitingForNext) return;
            itemEl.classList.add('is-dragging');
            startX = e.clientX; startY = e.clientY;
            window.addEventListener('pointermove', move);
            window.addEventListener('pointerup', up);
            e.preventDefault();
        });
    }

    // Shared evaluation for both Drop and Click-Flight
    function evaluateAction(itemEl, droppedZoneId, correctItemId, correctZoneId, onSuccess) {
        if (droppedZoneId === correctZoneId && itemEl.dataset.id === correctItemId) {
            itemEl.style.transition = 'all 0.2s';
            itemEl.style.transform = `translate(0, 0) scale(0)`;
            itemEl.style.opacity = '0';
            setTimeout(onSuccess, 200);
        } else if (droppedZoneId) {
            itemEl.style.transform = `translate(0px, 0px)`;
            triggerError(itemEl);
        } else {
            itemEl.style.transform = `translate(0px, 0px)`; // Empty space snapback
        }
    }

    // --- WIN STATE & PRIZES ---
    function triggerWin() {
        playArea.innerHTML = '';
        isWaitingForNext = true;
        
        let chest = document.createElement('div');
        chest.className = 'chest chest-shake'; chest.innerText = '🧰';
        
        let inst = document.createElement('div');
        inst.innerText = "Click to open your prize!";
        inst.style.fontSize = "24px"; inst.style.fontWeight = "bold"; inst.style.color = "#8e24aa";

        chest.onclick = () => {
            chest.classList.remove('chest-shake'); chest.onclick = null;
            initAudio();
            playTone(400, 'sine', 0.1); setTimeout(() => playTone(500, 'sine', 0.1), 100); setTimeout(() => playTone(600, 'sine', 0.4), 200);

            const prize = getRandom(prizesPool);
            
            // Add to session shelf
            sessionPrizes.push(prize);
            updatePrizeShelf(prize);

            playArea.innerHTML = '';
            let prizeEl = document.createElement('div');
            prizeEl.className = 'prize-emoji';
            prizeEl.innerText = prize;
            playArea.appendChild(prizeEl);

            fireConfetti();
            nextQuestBtn.style.display = 'block';
        };

        playArea.appendChild(chest); playArea.appendChild(inst);
    }

    function updatePrizeShelf(newPrize) {
        let el = document.createElement('div');
        el.className = 'collected-prize';
        el.innerText = newPrize;
        prizeList.appendChild(el);
    }

    function fireConfetti() {
        const cx = window.innerWidth / 2; const cy = window.innerHeight / 2;
        const colors = ['#ce93d8', '#4fc3f7', '#81c784', '#fff176', '#ffb74d'];
        
        for (let i = 0; i < 80; i++) {
            const p = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            p.setAttribute("cx", cx); p.setAttribute("cy", cy);
            p.setAttribute("r", Math.random() * 6 + 4); p.setAttribute("class", "particle");
            p.style.fill = colors[Math.floor(Math.random() * colors.length)];
            confettiSvg.appendChild(p);
            
            p.getBoundingClientRect(); 
            const angle = Math.random() * Math.PI * 2; const distance = Math.random() * 400 + 100; 
            
            p.setAttribute("cx", cx + Math.cos(angle) * distance);
            p.setAttribute("cy", cy + Math.sin(angle) * distance + 150);
            p.style.opacity = "0";
            
            setTimeout(() => p.remove(), 1500);
        }
    }
</script>
</body>
</html>
